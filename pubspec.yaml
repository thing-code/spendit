name: spendit
description: "A new Flutter project."

publish_to: "none"

version: 1.0.1+4

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  fpdart: ^1.2.0
  freezed_annotation: ^3.1.0
  intl: ^0.20.2
  json_annotation: ^4.11.0
  go_router: ^17.1.0
  reactive_forms: ^18.2.2
  solar_icons: ^0.0.5
  sqflite: ^2.4.2
  path: ^1.9.1
  native_storage: ^0.4.0
  fl_chart: ^1.2.0
  flutter_animate: ^4.5.2
  skeletonizer: ^2.1.3
  flutter_screenutil: ^5.9.3
  another_flushbar: ^1.12.32
  reactive_dropdown_search: ^6.0.0-pre4
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3
  json_serializable: ^6.13.0
  freezed: ^3.2.5
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/
    - shorebird.yaml
  fonts:
    - family: SF Pro Display
      fonts:
        - asset: fonts/SF-Pro-Display-Bold.otf
          weight: 700
        - asset: fonts/SF-Pro-Display-Semibold.otf
          weight: 600
        - asset: fonts/SF-Pro-Display-Medium.otf
          weight: 500
        - asset: fonts/SF-Pro-Display-Regular.otf
          weight: 400
        - asset: fonts/SF-Pro-Display-Light.otf
          weight: 300
    - family: SF Pro Text
      fonts:
        - asset: fonts/SF-Pro-Text-Bold.otf
          weight: 700
        - asset: fonts/SF-Pro-Text-Semibold.otf
          weight: 600
        - asset: fonts/SF-Pro-Text-Medium.otf
          weight: 500
        - asset: fonts/SF-Pro-Text-Regular.otf
          weight: 400
        - asset: fonts/SF-Pro-Text-Light.otf
          weight: 300

flutter_native_splash:
  color: "#ffffff"
  image: splash/logo.png
  android_12:
    image: splash/logo.png
    color: "#ffffff"
    image_dark: splash/logo.png
    color_dark: "#1e1e1e"
